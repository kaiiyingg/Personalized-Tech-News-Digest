name: Scheduled Content Refresh

on:
  schedule:
    # Run once daily at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  refresh-content:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Content Refresh
        run: |
          set -euo pipefail
          response_file=$(mktemp)
          status_code=$(curl -sS -o "$response_file" -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d '{}' \
            --max-time 600 \
            https://personalized-tech-news-digest.onrender.com/api/jobs/ingest)
          echo "HTTP status: $status_code"
          echo "Response body:"
          cat "$response_file"
          if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
            echo "Refresh endpoint failed with HTTP $status_code"
            exit 1
          fi
          if grep -q '"success"' "$response_file"; then
            success_value=$(jq -r '.success // empty' "$response_file")
            if [ -n "$success_value" ] && [ "$success_value" != "true" ]; then
              echo "Ingestion API reported failure."
              exit 1
            fi
          fi
        timeout-minutes: 10
